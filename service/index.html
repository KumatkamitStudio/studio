<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumatkamit.Studio - Service & Pricing</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fonts: Plus Jakarta Sans & Material Symbols Rounded -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            letter-spacing: -0.02em;
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
        
        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* Styling Cetak Presisi 1 Halaman PDF */
        @media print {
            body * { visibility: hidden; }
            #invoice-print-area, #invoice-print-area * { visibility: visible; }
            #invoice-print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                color: #000 !important;
                background: #fff !important;
                padding: 15px;
                border: none !important;
                box-shadow: none !important;
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const WA_NUMBER = '6281514655518'; 
        const VALID_COUPON = 'KUMATKAMITSTD';
        const DISCOUNT_PERCENT = 20;

        const PACKAGES = [
          {
            id: 'starter',
            name: 'Starter',
            target: 'UMKM & Personal Brand',
            desc: 'Solusi esensial untuk membangun konsistensi visual di media sosial. Sangat cocok untuk bisnis lokal, pelaku UMKM, atau personal branding awal yang membutuhkan publikasi konten rapi.',
            features: [
              { label: '10 Desain Feed / Post / Story', icon: 'draw' },
              { label: '8 Video Reels / TikTok / Short', icon: 'smart_display' }
            ],
            price: [2500000, 3000000],
            color: 'emerald-400'
          },
          {
            id: 'pro',
            name: 'Pro',
            target: 'Bisnis Bertumbuh',
            popular: true,
            desc: 'Paket manajemen komparatif dirancang akseleratif untuk pertumbuhan engagement. Menyediakan strategi konten menyeluruh dari riset tren hingga optimasi berbayar.',
            features: [
              { label: 'Full Social Media Management', icon: 'manage_accounts' },
              { label: '15 Desain Feed / Post / Story', icon: 'draw' },
              { label: '15 Video Reels / TikTok', icon: 'smart_display' },
              { label: 'Setup Ads & Campaign Management', icon: 'campaign' }
            ],
            price: [6000000, 10000000],
            color: 'emerald-600'
          },
          {
            id: 'suite',
            name: 'Suite',
            target: 'Corporate & Brand System',
            desc: 'Pendekatan branding korporat komprehensif skala penuh. Memadukan tim kreatif multidisiplin untuk memproduksi ekosistem visual premium jangka panjang.',
            features: [
              { label: 'Dedicated Social Media Management', icon: 'manage_accounts' },
              { label: 'Professional Video & Photo Shoot', icon: 'photo_camera' },
              { label: '20 Desain Feed / Post / Story', icon: 'draw' },
              { label: '20 Video Reels / TikTok / Cinematic', icon: 'smart_display' }
            ],
            price: [12000000, 20000000],
            color: 'emerald-800'
          }
        ];

        const ADDONS = [
          { id: 'Logo-guideline', name: 'Logo Design & Brand Guideline', desc: 'Penyusunan identitas visual esensial (logo master & pakem warna identitas).', price: [2000000, 4000000], cat: 'Branding' },
          { id: 'Logo-kit', name: 'Logo Design & Branding Kit', desc: 'Sistem arsitektur brand menyeluruh, ikon kustom, hingga template kartu nama.', price: [6000000, 9000000], cat: 'Branding' },
          { id: 'reels', name: 'Editing Reels / TikTok / Short', desc: 'Pemotongan & penyuntingan video pendek vertikal kreatif mengikuti algoritma tren.', price: [150000, 300000], unit: 'video', cat: 'Video' },
          { id: 'video-long', name: 'Video Long Format', desc: 'Editing video berdurasi panjang dengan alur cerita terstruktur untuk aset YouTube/Event.', price: [250000, 500000], unit: 'video', cat: 'Video' },
          { id: 'company-profile', name: 'Pembuatan Company Profile', desc: 'Layanan hulu ke hilir produksi video profil perusahaan mulai skrip hingga VO.', price: [1000000, 2000000], cat: 'Video' },
          { id: 'photo', name: 'Editing Foto Produk', desc: 'Proses manipulasi foto digital profesional (background removal & color correction).', price: [50000, 150000], unit: 'foto', cat: 'Design' },
          { id: 'feed', name: 'Desain Feed Sosmed', desc: 'Pembuatan visual grafis beresolusi tinggi untuk postingan media sosial per item.', price: [100000, 250000], unit: 'post', cat: 'Design' },
          { id: 'landing', name: 'Landing Page / Website', desc: 'Perancangan halaman website satu halaman atau profil modern yang responsif.', price: [3000000, 5000000], cat: 'Web' }
        ];

        const AppLogo = ({ className }) => (
            <svg className={className} viewBox="0 0 1120 944" xmlns="https://www.w3.org/2000/svg" fill="currentColor">
                <path d="M657.246 479.2H1126V943.62H652.026V701.421C297.068 701.421 204.121 866.198 204.121 943.62H1.58594C1.58594 855.735 73.6535 672.573 213.549 588.01C371.401 492.592 566.418 479.2 657.246 478.153V479.2ZM474.643 242.198C830.101 242.198 923.18 77.4223 923.18 0H1126C1126 87.8849 1053.83 271.047 913.738 355.61C755.664 451.028 560.371 464.42 469.415 465.466V464.42H0V0H474.643V242.198Z"/>
            </svg>
        );

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        const App = () => {
            const [clientInfo, setClientInfo] = useState({ name: '', company: '', email: '', phone: '' });
            const [selected, setSelected] = useState([]);
            const [couponInput, setCouponInput] = useState('');
            const [couponApplied, setCouponApplied] = useState(false);
            const [couponError, setCouponError] = useState(false);

            const toggle = (id) => setSelected(prev => prev.find(i => i.id === id) ? prev.filter(i => i.id !== id) : [...prev, { id, qty: 1 }]);
            const updQty = (id, d) => setSelected(prev => prev.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + d) } : i));
            const handleClientChange = (e) => setClientInfo(prev => ({ ...prev, [e.target.name]: e.target.value }));

            const handleApplyCoupon = () => {
                if (couponInput.trim().toUpperCase() === VALID_COUPON) {
                    setCouponApplied(true);
                    setCouponError(false);
                } else {
                    setCouponError(true);
                    setCouponApplied(false);
                }
            };

            // Kalkulasi subtotal (Min & Max Range)
            const totals = useMemo(() => {
                let min = 0;
                let max = 0;
                selected.forEach(item => {
                    const addon = ADDONS.find(x => x.id === item.id);
                    if (addon) {
                        min += addon.price[0] * item.qty;
                        max += addon.price[1] * item.qty;
                    }
                });

                let discountMin = 0;
                let discountMax = 0;
                if (couponApplied) {
                    discountMin = min * (DISCOUNT_PERCENT / 100);
                    discountMax = max * (DISCOUNT_PERCENT / 100);
                }

                return {
                    subtotalMin: min,
                    subtotalMax: max,
                    discountMin,
                    discountMax,
                    finalMin: min - discountMin,
                    finalMax: max - discountMax
                };
            }, [selected, couponApplied]);

            const handlePackageWhatsApp = (pkg) => {
                let text = `Halo Kumatkamit Studio, saya tertarik dengan *Paket Utama: ${pkg.name}* (${formatIDR(pkg.price[0])} - ${formatIDR(pkg.price[1])}).%0A%0AMohon info ketersediaan slotnya.`;
                window.open(`https://wa.me/${WA_NUMBER}?text=${text}`, '_blank');
            };

            const handleCustomWhatsApp = () => {
                const addonsList = selected.map(s => {
                    const a = ADDONS.find(x => x.id === s.id);
                    return `- ${a.name} (${s.qty}x) [${formatIDR(a.price[0])} - ${formatIDR(a.price[1])}]`;
                }).join('\n');

                let text = `Halo Kumatkamit Studio, saya ingin mengajukan penawaran custom:%0A%0A`;
                text += `*Layanan Kustom:*%0A${addonsList ? addonsList.replace(/\n/g, '%0A') : '-'}`;
                if (couponApplied) text += `%0A%0A*Kupon Diskon:* ${VALID_COUPON} (Potongan 20%)`;
                text += `%0A*Estimasi Range Harga:* ${formatIDR(totals.finalMin)} - ${formatIDR(totals.finalMax)}`;
                text += `%0A%0A*Data Klien:*%0ANama: ${clientInfo.name || '-'}%0ABrand: ${clientInfo.company || '-'}%0AHP: ${clientInfo.phone || '-'}`;

                window.open(`https://wa.me/${WA_NUMBER}?text=${text}`, '_blank');
            };

            return (
                <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] py-6 border-b border-transparent">
      <div class="container mx-auto px-6 flex items-center justify-between">
        
         <!-- Logo -->
        <a href="#home" class="flex items-center gap-3 h-10 group">
          <div id="logo-container" class="transition-transform duration-500 origin-left">
            <svg id="nav-logo" class="h-10 w-auto transition-colors duration-500 text-white fill-current" viewBox="0 0 1120 944" xmlns="https://www.w3.org/2000/svg">
              <path d="M657.246 479.2H1126V943.62H652.026V701.421C297.068 701.421 204.121 866.198 204.121 943.62H1.58594C1.58594 855.735 73.6535 672.573 213.549 588.01C371.401 492.592 566.418 479.2 657.246 478.153V479.2ZM474.643 242.198C830.101 242.198 923.18 77.4223 923.18 0H1126C1126 87.8849 1053.83 271.047 913.738 355.61C755.664 451.028 560.371 464.42 469.415 465.466V464.42H0V0H474.643V242.198Z"/>
            </svg>
          </div>

          <div class="flex flex-col justify-center leading-none">
            <span class="font-bold text-lg tracking-tight logo-text text-white transition-colors duration-500">
              kumatkamit
            </span>
            <span class="font-light text-sm tracking-widest uppercase logo-sub text-gray-300 transition-colors duration-500">
              studio
            </span>
          </div>
        </a>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-6 space-y-10 w-full flex-grow">
                        
                        {/* SECTION 1: PACKAGES */}
                        <section>
                            <div className="flex items-center gap-2 mb-4 text-left">
                                <span className="material-symbols-rounded text-emerald-600 text-lg">layers</span>
                                <h2 className="text-lg font-bold text-slate-800 tracking-tight">1. Paket Social Media Management</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {PACKAGES.map(p => (
                                    <div key={p.id} onClick={() => handlePackageWhatsApp(p)} className="cursor-pointer group hover:border-emerald-500 hover:shadow-md transition-all rounded-2xl border border-slate-200 bg-white p-5 text-left flex flex-col justify-between relative">
                                        {p.popular && <div className="absolute top-3 right-3 bg-emerald-500 text-white px-2 py-0.5 rounded-full text-[8px] font-bold uppercase tracking-wider">Populer</div>}
                                        <div>
                                            <h3 className="font-bold text-slate-800 text-base mb-1">{p.name} <span className="text-[10px] text-slate-400 font-medium font-mono">({p.target})</span></h3>
                                            <p className="text-xs text-slate-500 leading-tight text-justify mb-3">{p.desc}</p>
                                        </div>
                                        <div className="pt-2 border-t border-slate-100 flex justify-between items-center">
                                            <span className="text-[11px] font-bold text-emerald-700">{formatIDR(p.price[0])} - {formatIDR(p.price[1])}</span>
                                            <span className="text-[10px] font-bold text-slate-400 group-hover:text-emerald-600 flex items-center gap-0.5">Pilih <span className="material-symbols-rounded text-xs">arrow_forward</span></span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* SECTION 2: ADDONS */}
                        <section>
                            <div className="flex items-center gap-2 mb-4 text-left">
                                <span className="material-symbols-rounded text-emerald-600 text-lg">add_box</span>
                                <h2 className="text-lg font-bold text-slate-800 tracking-tight">2. Tambah Layanan Kustom / Satuan</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                                {ADDONS.map(a => {
                                    const sel = selected.find(s => s.id === a.id);
                                    return (
                                        <div key={a.id} className={`p-4 rounded-xl border flex flex-col justify-between transition-all ${sel ? 'border-emerald-500 bg-emerald-50/50 shadow-sm' : 'border-slate-200 bg-white'}`}>
                                            <div className="text-left">
                                                <div className="flex justify-between items-start gap-2 mb-1">
                                                    <h4 className="font-bold text-slate-800 text-xs leading-tight flex-1">{a.name}</h4>
                                                    <input type="checkbox" checked={!!sel} onChange={() => toggle(a.id)} className="w-3.5 h-3.5 accent-emerald-600 cursor-pointer rounded mt-0.5" />
                                                </div>
                                                <p className="text-[11px] text-slate-400 leading-tight mb-2 text-justify">{a.desc}</p>
                                            </div>
                                            <div className="flex items-center justify-between pt-2 border-t border-slate-100 mt-2">
                                                <span className="text-[10px] font-semibold text-slate-600">{formatIDR(a.price[0])} - {formatIDR(a.price[1])}</span>
                                                {sel && (
                                                    <div className="flex items-center gap-1.5 bg-white px-1 py-0.5 rounded-md border border-slate-200">
                                                        <button onClick={() => updQty(a.id, -1)} className="text-slate-500 hover:text-emerald-600 font-bold text-xs px-1">-</button>
                                                        <span className="text-xs font-bold text-slate-800">{sel.qty}</span>
                                                        <button onClick={() => updQty(a.id, 1)} className="text-slate-500 hover:text-emerald-600 font-bold text-xs px-1">+</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        {/* SECTION 3: CHECKOUT GRID */}
                        <section className="bg-emerald-950 rounded-2xl p-5 md:p-8 text-white grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                            
                            {/* FORM KIRI (4 COLS) */}
                            <div className="lg:col-span-5 space-y-4 text-left">
                                <div>
                                    <h3 className="text-base font-bold text-white tracking-tight">3. Informasi & Kupon</h3>
                                    <p className="text-xs text-emerald-300/70">Lengkapi identitas untuk mengajukan penawaran</p>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input name="name" value={clientInfo.name} onChange={handleClientChange} type="text" placeholder="Nama Klien" className="w-full px-3 py-2 bg-emerald-900/50 border border-emerald-800 text-white placeholder-emerald-700 rounded-xl text-xs focus:outline-none focus:border-emerald-500 font-medium" />
                                    <input name="company" value={clientInfo.company} onChange={handleClientChange} type="text" placeholder="Nama Brand" className="w-full px-3 py-2 bg-emerald-900/50 border border-emerald-800 text-white placeholder-emerald-700 rounded-xl text-xs focus:outline-none focus:border-emerald-500 font-medium" />
                                    <input name="email" value={clientInfo.email} onChange={handleClientChange} type="email" placeholder="Email Kontak" className="w-full px-3 py-2 bg-emerald-900/50 border border-emerald-800 text-white placeholder-emerald-700 rounded-xl text-xs focus:outline-none focus:border-emerald-500 font-medium" />
                                    <input name="phone" value={clientInfo.phone} onChange={handleClientChange} type="text" placeholder="Nomor WhatsApp" className="w-full px-3 py-2 bg-emerald-900/50 border border-emerald-800 text-white placeholder-emerald-700 rounded-xl text-xs focus:outline-none focus:border-emerald-500 font-medium" />
                                </div>
                                
                                {/* Input Kupon Terintegrasi */}
                                <div className="pt-2 border-t border-emerald-900">
                                    <label className="text-[10px] font-bold text-emerald-400 uppercase tracking-wider block mb-1.5">Miliki Kode Voucher?</label>
                                    <div className="flex gap-2">
                                        <input value={couponInput} onChange={(e) => setCouponInput(e.target.value)} type="text" placeholder="Contoh: KUMATKAMITSTD" className="flex-1 px-3 py-2 bg-emerald-900/50 border border-emerald-800 text-white placeholder-emerald-700 rounded-xl text-xs uppercase tracking-wider font-bold focus:outline-none" />
                                        <button onClick={handleApplyCoupon} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl text-xs transition-colors">Gunakan</button>
                                    </div>
                                    {couponApplied && <p className="text-emerald-400 text-[11px] mt-1 flex items-center gap-1"><span className="material-symbols-rounded text-sm">check_circle</span> Kupon berhasil dipasang! Potongan 20%</p>}
                                    {couponError && <p className="text-red-400 text-[11px] mt-1 flex items-center gap-1"><span className="material-symbols-rounded text-sm">error</span> Kode kupon tidak valid.</p>}
                                </div>
                            </div>

                            {/* INVOICE PANEL KANAN (7 COLS) */}
                            <div id="invoice-print-area" className="lg:col-span-7 bg-white text-slate-800 p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-between min-h-[260px]">
                                <div>
                                    {/* Invoice Header dengan Logo Resmi */}
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-3 mb-3">
                                        <div className="flex items-center gap-2">
                                            <AppLogo className="h-5 w-auto text-emerald-950" />
                                            <div className="text-left leading-none">
                                                <h4 className="text-xs font-black tracking-tighter text-slate-900">Kumatkamit.Studio</h4>
                                                <span className="text-[7px] font-bold text-slate-400 uppercase tracking-widest">Official Quote</span>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <h3 className="text-xs font-bold text-emerald-800 tracking-tight uppercase">Invoice Penawaran</h3>
                                            <p className="text-[9px] text-slate-400">{clientInfo.company || 'Nama Brand'} / {clientInfo.name || 'Klien'}</p>
                                        </div>
                                    </div>

                                    {/* Belanjaan */}
                                    <div className="space-y-2 max-h-[120px] overflow-y-auto custom-scrollbar pr-1">
                                        {selected.length === 0 ? (
                                            <div className="text-center py-6 text-slate-400 text-[11px]">
                                                Belum ada item layanan kustom terpilih.
                                            </div>
                                        ) : (
                                            selected.map(item => {
                                                const data = ADDONS.find(x => x.id === item.id);
                                                if (!data) return null;
                                                return (
                                                    <div key={item.id} className="flex justify-between items-center text-[11px] border-b border-slate-50 pb-1.5">
                                                        <div className="text-left">
                                                            <p className="font-bold text-slate-700">{data.name}</p>
                                                            <p className="text-[9px] text-slate-400">{item.qty} Unit layanan kustom</p>
                                                        </div>
                                                        <span className="font-medium text-slate-600 text-right">{formatIDR(data.price[0] * item.qty)} - {formatIDR(data.price[1] * item.qty)}</span>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>

                                {/* Summary & Perhitungan Akhir */}
                                <div className="mt-4 border-t border-slate-200 pt-3">
                                    {couponApplied && (
                                        <div className="flex justify-between items-center text-[11px] text-slate-500 mb-1">
                                            <span>Diskon Kupon (20%)</span>
                                            <span className="text-red-600 font-medium">-{formatIDR(totals.discountMin)} - -{formatIDR(totals.discountMax)}</span>
                                        </div>
                                    )}
                                    <div className="flex justify-between items-center mb-3">
                                        <span className="text-[10px] font-bold text-slate-500 uppercase">Estimasi Total Biaya</span>
                                        <span className="text-sm font-extrabold text-emerald-700">{formatIDR(totals.finalMin)} - {formatIDR(totals.finalMax)}</span>
                                    </div>
                                    
                                    <div className="no-print flex gap-2">
                                        {selected.length > 0 && (
                                            <button onClick={() => window.print()} className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition-colors flex items-center justify-center gap-1">
                                                <span className="material-symbols-rounded text-sm">print</span> Cetak / PDF
                                            </button>
                                        )}
                                        <button onClick={handleCustomWhatsApp} disabled={selected.length === 0} className="flex-[2] py-2 bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-200 disabled:text-slate-400 text-white font-bold rounded-lg text-xs transition-colors flex items-center justify-center gap-1.5">
                                            <span className="material-symbols-rounded text-sm">send</span> Kirim ke WhatsApp
                                        </button>
                                    </div>
                                </div>
                            </div>

                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
